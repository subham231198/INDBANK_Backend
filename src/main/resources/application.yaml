spring:
  application:
    name: ServiceA

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      acks: all
      retries: 3

      properties:
        enable.idempotence: true


  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: "jdbc:mysql://localhost:3306/Application_A?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: "root"
    password: "SM231198"
    driver-class-name: "com.mysql.cj.jdbc.Driver"
  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

resilience4j:
  circuitbreaker:
    instances:
      ServiceB:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        sliding-window-size: 10
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

        ignore-exceptions:
          - com.example.ServiceA.ServiceA.Exception.InvalidAuthIdException
server:
    port: 9090

